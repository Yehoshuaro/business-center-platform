<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d2a40"/>
      <stop offset="1" stop-color="#0b1424"/>
    </linearGradient>
    <linearGradient id="ftbl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22324d"/>
      <stop offset="1" stop-color="#0c1525"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.5" cy="0.1" r="0.7">
      <stop offset="0" stop-color="#f4d99c" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#f4d99c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#wall)"/>
  <rect width="1600" height="1000" fill="url(#spot)"/>
  <!-- ceiling lines -->
  <g stroke="#c8b58a" stroke-opacity="0.18">
    <path d="M0 80 H1600 M0 130 H1600 M0 180 H1600"/>
  </g>
  <!-- pendant lights -->
  <g fill="#f4d99c" fill-opacity="0.85">
    <circle cx="400" cy="240" r="6"/>
    <circle cx="800" cy="240" r="6"/>
    <circle cx="1200" cy="240" r="6"/>
  </g>
  <g stroke="#c8a268" stroke-opacity="0.6">
    <path d="M400 80 V234"/>
    <path d="M800 80 V234"/>
    <path d="M1200 80 V234"/>
  </g>
  <!-- screen on wall -->
  <rect x="500" y="200" width="600" height="260" fill="#06101e" stroke="#c8a268" stroke-opacity="0.5"/>
  <rect x="540" y="240" width="520" height="3" fill="#c8a268" fill-opacity="0.45"/>
  <rect x="540" y="270" width="380" height="3" fill="#c8a268" fill-opacity="0.25"/>
  <rect x="540" y="295" width="460" height="3" fill="#c8a268" fill-opacity="0.25"/>
  <rect x="540" y="320" width="280" height="3" fill="#c8a268" fill-opacity="0.25"/>
  <!-- conference table -->
  <ellipse cx="800" cy="780" rx="540" ry="80" fill="url(#ftbl)"/>
  <ellipse cx="800" cy="775" rx="540" ry="80" fill="none" stroke="#c8a268" stroke-opacity="0.4"/>
  <!-- chairs around -->
  <g fill="#0a1322">
    <rect x="320" y="700" width="60" height="60" rx="6"/>
    <rect x="440" y="690" width="60" height="60" rx="6"/>
    <rect x="560" y="685" width="60" height="60" rx="6"/>
    <rect x="680" y="682" width="60" height="60" rx="6"/>
    <rect x="800" y="682" width="60" height="60" rx="6"/>
    <rect x="920" y="685" width="60" height="60" rx="6"/>
    <rect x="1040" y="690" width="60" height="60" rx="6"/>
    <rect x="1160" y="700" width="60" height="60" rx="6"/>
  </g>
  <!-- floor -->
  <rect y="900" width="1600" height="100" fill="#060b15"/>
  <text x="80" y="970" font-family="Georgia, serif" font-size="22" fill="#c8a268" fill-opacity="0.6" letter-spacing="5">CONFERENCE HALL · FORUM</text>
</svg>
