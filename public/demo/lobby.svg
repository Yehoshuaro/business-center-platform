<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2942"/>
      <stop offset="0.55" stop-color="#2f4566"/>
      <stop offset="1" stop-color="#0d1729"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15233b"/>
      <stop offset="1" stop-color="#070d18"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d4ad6f" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#d4ad6f" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#sky)"/>
  <rect y="640" width="1600" height="360" fill="url(#floor)"/>
  <!-- floor reflection -->
  <rect y="640" width="1600" height="360" fill="url(#warm)"/>
  <!-- window grid -->
  <g stroke="#c8b58a" stroke-opacity="0.22" stroke-width="1">
    <path d="M0 220 H1600 M0 360 H1600 M0 500 H1600 M0 640 H1600"/>
    <path d="M150 60 V640 M340 60 V640 M530 60 V640 M720 60 V640 M910 60 V640 M1100 60 V640 M1290 60 V640 M1480 60 V640"/>
  </g>
  <!-- window glow panels -->
  <g fill="#f3e3c2" fill-opacity="0.06">
    <rect x="150" y="60" width="190" height="170"/>
    <rect x="530" y="60" width="190" height="170"/>
    <rect x="910" y="60" width="190" height="170"/>
    <rect x="1290" y="60" width="190" height="170"/>
  </g>
  <!-- columns -->
  <g fill="#0a1322">
    <rect x="380" y="220" width="36" height="420"/>
    <rect x="780" y="220" width="36" height="420"/>
    <rect x="1180" y="220" width="36" height="420"/>
  </g>
  <!-- reception desk -->
  <g>
    <rect x="600" y="560" width="400" height="80" fill="#0c1424"/>
    <rect x="600" y="560" width="400" height="4" fill="#c8a268"/>
    <rect x="700" y="640" width="200" height="14" fill="#c8a268" fill-opacity="0.4"/>
  </g>
  <!-- floor lines -->
  <g stroke="#c8b58a" stroke-opacity="0.12">
    <path d="M0 760 L1600 760"/>
    <path d="M0 860 L1600 860"/>
  </g>
  <!-- subtle BC mark -->
  <text x="80" y="940" font-family="Georgia, serif" font-size="34" fill="#c8a268" fill-opacity="0.55" letter-spacing="6">BUSINESS CENTER</text>
</svg>
