<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="os" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#212f48"/>
      <stop offset="1" stop-color="#0a1322"/>
    </linearGradient>
    <linearGradient id="osWin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6b85a7"/>
      <stop offset="1" stop-color="#23385a"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#os)"/>
  <!-- panoramic window strip -->
  <rect x="0" y="100" width="1600" height="380" fill="url(#osWin)"/>
  <g stroke="#0a1322" stroke-width="3">
    <path d="M200 100 V480 M400 100 V480 M600 100 V480 M800 100 V480 M1000 100 V480 M1200 100 V480 M1400 100 V480"/>
    <path d="M0 290 H1600"/>
  </g>
  <rect x="0" y="100" width="1600" height="380" fill="none" stroke="#c8a268" stroke-opacity="0.4" stroke-width="2"/>
  <!-- ceiling track lights -->
  <g stroke="#c8a268" stroke-opacity="0.5">
    <path d="M0 80 H1600"/>
    <path d="M0 95 H1600" stroke-opacity="0.25"/>
  </g>
  <!-- desks rows -->
  <g>
    <!-- row 1 -->
    <g fill="#0e1828" stroke="#c8a268" stroke-opacity="0.4">
      <rect x="120" y="600" width="240" height="60" rx="3"/>
      <rect x="400" y="600" width="240" height="60" rx="3"/>
      <rect x="680" y="600" width="240" height="60" rx="3"/>
      <rect x="960" y="600" width="240" height="60" rx="3"/>
      <rect x="1240" y="600" width="240" height="60" rx="3"/>
    </g>
    <!-- monitors -->
    <g fill="#06101e" stroke="#c8a268" stroke-opacity="0.5">
      <rect x="180" y="540" width="120" height="60"/>
      <rect x="460" y="540" width="120" height="60"/>
      <rect x="740" y="540" width="120" height="60"/>
      <rect x="1020" y="540" width="120" height="60"/>
      <rect x="1300" y="540" width="120" height="60"/>
    </g>
    <!-- chairs -->
    <g fill="#0a131f">
      <rect x="200" y="690" width="80" height="80" rx="8"/>
      <rect x="480" y="690" width="80" height="80" rx="8"/>
      <rect x="760" y="690" width="80" height="80" rx="8"/>
      <rect x="1040" y="690" width="80" height="80" rx="8"/>
      <rect x="1320" y="690" width="80" height="80" rx="8"/>
    </g>
    <!-- row 2 (smaller, behind) -->
    <g fill="#0e1828" stroke="#c8a268" stroke-opacity="0.25">
      <rect x="180" y="820" width="180" height="40" rx="2"/>
      <rect x="440" y="820" width="180" height="40" rx="2"/>
      <rect x="700" y="820" width="180" height="40" rx="2"/>
      <rect x="960" y="820" width="180" height="40" rx="2"/>
      <rect x="1220" y="820" width="180" height="40" rx="2"/>
    </g>
  </g>
  <!-- floor -->
  <rect y="900" width="1600" height="100" fill="#050a14"/>
  <text x="80" y="970" font-family="Georgia, serif" font-size="22" fill="#c8a268" fill-opacity="0.6" letter-spacing="5">OPEN SPACE · FLOOR 6</text>
</svg>
