<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="rm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d2940"/>
      <stop offset="1" stop-color="#0a1424"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#rm)"/>
  <!-- back wall TV -->
  <rect x="500" y="160" width="600" height="340" rx="6" fill="#06101e" stroke="#c8a268" stroke-opacity="0.55"/>
  <g fill="#c8a268" fill-opacity="0.5">
    <rect x="540" y="200" width="200" height="6"/>
    <rect x="540" y="220" width="320" height="3"/>
    <rect x="540" y="240" width="280" height="3"/>
    <rect x="540" y="270" width="380" height="3"/>
    <rect x="540" y="290" width="240" height="3"/>
    <rect x="540" y="320" width="300" height="3"/>
  </g>
  <g fill="#c8a268" fill-opacity="0.3">
    <rect x="900" y="240" width="160" height="100"/>
  </g>
  <!-- table -->
  <rect x="200" y="700" width="1200" height="60" rx="6" fill="#101a2e"/>
  <rect x="200" y="700" width="1200" height="4" fill="#c8a268" fill-opacity="0.6"/>
  <!-- chairs near -->
  <g fill="#0a131f">
    <rect x="280" y="640" width="100" height="60" rx="6"/>
    <rect x="420" y="640" width="100" height="60" rx="6"/>
    <rect x="560" y="640" width="100" height="60" rx="6"/>
    <rect x="700" y="640" width="100" height="60" rx="6"/>
    <rect x="840" y="640" width="100" height="60" rx="6"/>
    <rect x="980" y="640" width="100" height="60" rx="6"/>
    <rect x="1120" y="640" width="100" height="60" rx="6"/>
  </g>
  <!-- floor -->
  <rect y="820" width="1600" height="180" fill="#060c18"/>
  <text x="80" y="970" font-family="Georgia, serif" font-size="22" fill="#c8a268" fill-opacity="0.6" letter-spacing="5">MEETING ROOM · ASPEN</text>
</svg>
