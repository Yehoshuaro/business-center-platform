  </g>
  <!-- rooftop railing -->
  <rect y="820" width="1600" height="6" fill="#c8a268" fill-opacity="0.8"/>
  <g stroke="#c8a268" stroke-opacity="0.5">
    <path d="M100 826 V900 M260 826 V900 M420 826 V900 M580 826 V900 M740 826 V900 M900 826 V900 M1060 826 V900 M1220 826 V900 M1380 826 V900 M1540 826 V900"/>
  </g>
  <!-- terrace floor -->
  <rect y="900" width="1600" height="100" fill="#0a1322"/>
  <text x="80" y="970" font-family="Georgia, serif" font-size="22" fill="#c8a268" fill-opacity="0.8" letter-spacing="5">ROOFTOP TERRACE · 9TH FLOOR</text>
