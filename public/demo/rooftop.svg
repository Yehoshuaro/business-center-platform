<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sunset" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#142036"/>
      <stop offset="0.45" stop-color="#3a3f5a"/>
      <stop offset="0.75" stop-color="#a07248"/>
      <stop offset="1" stop-color="#48304a"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#sunset)"/>
  <!-- distant city skyline -->
  <g fill="#0a1322" opacity="0.85">
    <rect x="0" y="540" width="80" height="280"/>
    <rect x="80" y="520" width="120" height="300"/>
    <rect x="200" y="560" width="90" height="260"/>
    <rect x="290" y="500" width="160" height="320"/>
    <rect x="450" y="540" width="100" height="280"/>
    <rect x="550" y="480" width="180" height="340"/>
    <rect x="730" y="540" width="90" height="280"/>
    <rect x="820" y="500" width="140" height="320"/>
    <rect x="960" y="520" width="120" height="300"/>
    <rect x="1080" y="560" width="100" height="260"/>
    <rect x="1180" y="500" width="170" height="320"/>
    <rect x="1350" y="540" width="120" height="280"/>
    <rect x="1470" y="520" width="130" height="300"/>
  </g>
  <!-- specks of light -->
  <g fill="#f0d59a" fill-opacity="0.8">
